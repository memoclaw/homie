app:
  logLevel: info
  dataDir: ./data

# Telegram (required)
telegram:
  botToken: ${TELEGRAM_BOT_TOKEN}

# Provider (auto-detects claude-code or codex)
provider:
  model: ""
  extraArgs: []

# GitHub workflow polling (scaffolded, not started yet)
github:
  enabled: true
  pollIntervalSec: 60
  workflowsDir: ./workflows/github
