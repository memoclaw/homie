app:
  logLevel: info
  dataDir: ./data

# Telegram (required)
telegram:
  botToken: ${TELEGRAM_BOT_TOKEN}

# Provider (auto-detects claude-code or codex)
provider:
  model: ""
  extraArgs: []

# GitHub webhooks (requires GitHub App + tunnel)
github:
  enabled: false
  token: ${GITHUB_TOKEN}
  workflowsDir: ./workflows/github
  webhook:
    port: 3100
    path: /webhooks/github
    secret: ${GITHUB_WEBHOOK_SECRET}
